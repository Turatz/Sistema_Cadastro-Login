<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título da aba -->
  <title>Bem-vindo</title>

<body>

  <!-- Container principal -->
  <main class="ws-wrap">

    <!-- Central -->
    <section class="ws-card">

      <!-- Tag status -->
      <span class="ws-tag">Conta criada</span>

      <!-- Título -->
      <h1 class="ws-title">
        Bem-vindo(a)!<br>Você está dentro.
      </h1>

      <!-- Subtítulo -->
      <p class="ws-sub">
        Seu cadastro foi realizado com sucesso.<br>
      </p>

      <!-- Linha divisória -->
      <hr class="ws-divider">

      <!-- Lista -->
          <div class="ws-step-text">
            <strong>Cadastro concluído</strong>
            Sua conta foi criada e está pronta para uso.
          </div>

        <!-- link secundario -->
         <div>
        <a href="/" class="ws-link">Voltar para a página inicial</a>
        </div>
        <div>
        <a href="/accounts/logout/" class="ws-btn">Deslogar</a>
        </div>

    </section>
  </main>

</body>
</html>
